services:
  timescaledb:
    image: timescale/timescaledb-ha:pg17
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://pulse:pulse@timescaledb:5432/pulse
    volumes:
      - ../api:/app
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    ports:
      - "5173:5173"
    env_file:
      - ../.env
    depends_on:
      - api
    restart: unless-stopped

volumes:
  timescaledb_data:
