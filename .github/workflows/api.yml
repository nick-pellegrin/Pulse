name: API CI

on:
  push:
    paths:
      - "api/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api.yml"

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run pyright

      - name: Test
        run: uv run pytest
